<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순공시간 챌린지 · 교사용</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root{
    --paper:#FAFAFE; --card:#FFFFFF; --border:#ECEBF7; --ink:#241F3D; --ink-soft:#9490B0;
    --accent:#7C5CFC; --rose:#F0426C;
    --mon:#FF6B6B; --tue:#FFA94D; --wed:#F4C430; --thu:#51CF66; --fri:#4DABF7; --sat:#7C5CFC; --sun:#CC5DE8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;-webkit-font-smoothing:antialiased;padding:20px 16px 60px;}
  .wrap{max-width:560px;margin:0 auto;}
  .hidden{display:none !important;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11px;letter-spacing:.08em;font-weight:700;color:var(--accent);
    text-transform:uppercase;
    background:linear-gradient(90deg, rgba(124,92,252,.10), rgba(204,93,232,.10));
    border:1px solid rgba(124,92,252,.18);
    padding:5px 13px;border-radius:100px;margin-bottom:12px;
  }
  h1{font-weight:700;font-size:23px;margin:0 0 12px;letter-spacing:-.01em;
    background:linear-gradient(90deg,var(--accent),var(--sun));
    -webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block;}
  .rainbow-bar{height:5px;border-radius:100px;margin-bottom:20px;background:linear-gradient(90deg,var(--mon),var(--tue),var(--wed),var(--thu),var(--fri),var(--sat),var(--sun));}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 2px 16px rgba(31,42,68,.04);}

  input[type=password], input[type=text], textarea{
    width:100%;font-family:inherit;font-size:14px;padding:11px 12px;border-radius:11px;
    border:1px solid var(--border);background:var(--paper);color:var(--ink);
  }
  input:focus, textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  textarea{resize:none;min-height:90px;}
  .btn{width:100%;margin-top:10px;padding:13px;border-radius:13px;border:none;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#255bc2;}
  .btn-primary:disabled{opacity:.6;cursor:default;}

  .section-title{font-weight:700;font-size:17px;margin-bottom:12px;}
  .notice-current{font-size:13px;color:var(--ink-soft);margin-bottom:10px;padding:10px 12px;background:var(--paper);border-radius:10px;white-space:pre-wrap;}

  .rank-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border);}
  .rank-row:last-child{border-bottom:none;}
  .rank-num{width:24px;font-weight:700;font-size:14px;color:var(--ink-soft);text-align:center;}
  .rank-name{flex:1;font-size:13.5px;font-weight:600;}
  .rank-time{font-size:14px;font-weight:600;}

  .note-row{padding:12px 2px;border-bottom:1px solid var(--border);}
  .note-row:last-child{border-bottom:none;}
  .note-meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;}
  .note-msg{font-size:13.5px;line-height:1.5;}
  .empty-state{text-align:center;color:var(--ink-soft);font-size:12.5px;padding:20px 0;}
  .refresh-link{font-size:11.5px;color:var(--accent);cursor:pointer;font-weight:600;text-align:right;margin-bottom:10px;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:100px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  /* 학생 전체 보기 */
  .roster-controls{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .roster-sort, .roster-filter{display:flex;gap:6px;flex-wrap:wrap;}
  .sort-btn, .filter-chip{
    font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;
    border:1px solid var(--border);background:var(--paper);color:var(--ink-soft);cursor:pointer;
  }
  .sort-btn.active, .filter-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .roster-row{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--border);cursor:pointer;}
  .roster-row:last-child{border-bottom:none;}
  .roster-row:hover{background:var(--paper);}
  .roster-row .r-name{flex:1;font-size:13.5px;font-weight:600;}
  .roster-row .r-grade{font-size:11.5px;color:var(--ink-soft);background:var(--paper);border-radius:100px;padding:3px 9px;}
  .roster-row .r-time{font-size:13.5px;font-weight:700;color:var(--accent);}
  .roster-row .r-arrow{color:var(--ink-soft);font-size:14px;}

  /* 학생 상세보기 */
  .overlay{position:fixed;inset:0;background:rgba(31,42,68,.45);display:none;align-items:flex-end;justify-content:center;z-index:70;}
  .overlay.open{display:flex;}
  .detail-modal{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:22px;max-height:88vh;overflow-y:auto;}
  .detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .detail-head .d-name{font-weight:700;font-size:19px;}
  .detail-head .close-btn{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;line-height:1;}
  .detail-grade{font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
  .detail-summary{display:flex;gap:18px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px;}
  .detail-summary .d-stat{flex:1;text-align:center;}
  .detail-summary .d-stat b{display:block;font-size:16px;font-weight:700;}
  .detail-summary .d-stat small{font-size:10.5px;color:var(--ink-soft);}
  .day-entry{padding:12px 2px;border-bottom:1px solid var(--border);}
  .day-entry:last-child{border-bottom:none;}
  .day-entry .de-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .day-entry .de-date{font-size:13px;font-weight:700;}
  .day-entry .de-time{font-size:13px;font-weight:700;color:var(--accent);}
  .day-entry .de-note{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:6px;}
  .day-photos{display:flex;gap:6px;flex-wrap:wrap;}
  .day-photos a{display:block;width:56px;height:56px;border-radius:8px;overflow:hidden;}
  .day-photos img{width:100%;height:100%;object-fit:cover;display:block;}
</style>
</head>
<body>
<div class="wrap">

  <div id="dash">
    <div class="eyebrow">🎓 Academic Growth · 전남외고</div>
    <h1>교사용 대시보드</h1>
    <div class="rainbow-bar"></div>

    <div class="card">
      <div class="section-title">📌 공지사항 관리</div>
      <div class="notice-current" id="noticeCurrent">등록된 공지가 없습니다.</div>
      <textarea id="noticeInput" placeholder="학생들에게 전할 공지사항을 입력하세요"></textarea>
      <button class="btn btn-primary" id="noticeSave">공지 게시</button>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshBoard">↻ 새로고침</div>
      <div class="section-title">🏆 전체 순위</div>
      <div id="rankList"><div class="empty-state">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshRoster">↻ 새로고침</div>
      <div class="section-title">👥 학생 전체 보기</div>
      <div class="roster-controls">
        <div class="roster-sort">
          <button class="sort-btn active" data-sort="name">이름순</button>
          <button class="sort-btn" data-sort="grade">학년순</button>
          <button class="sort-btn" data-sort="time">시간순</button>
        </div>
        <div class="roster-filter" id="gradeFilter">
          <button class="filter-chip active" data-grade="">전체</button>
          <button class="filter-chip" data-grade="1학년">1학년</button>
          <button class="filter-chip" data-grade="2학년">2학년</button>
          <button class="filter-chip" data-grade="3학년">3학년</button>
        </div>
      </div>
      <div id="rosterList"><div class="empty-state">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshNotes">↻ 새로고침</div>
      <div class="section-title">✉️ 학생 문의사항</div>
      <div id="noteList"><div class="empty-state">불러오는 중…</div></div>
    </div>
  </div>

</div>

<div class="overlay" id="detailOverlay">
  <div class="detail-modal">
    <div class="detail-head">
      <div class="d-name" id="detailName">-</div>
      <button class="close-btn" id="closeDetail">✕</button>
    </div>
    <div class="detail-grade" id="detailGrade"></div>
    <div class="detail-summary">
      <div class="d-stat"><b id="detailTotal">0h 0m</b><small>총 순공시간</small></div>
      <div class="d-stat"><b id="detailDays">0/28</b><small>기록한 날</small></div>
    </div>
    <div id="detailList"><div class="empty-state">불러오는 중…</div></div>
  </div>
</div>

<div class="toast" id="toast">저장되었습니다</div>

<script>
/* Apps Script 배포 URL을 붙여넣으세요 (학생용 파일과 동일한 URL) */
const API_URL = 'https://script.google.com/macros/s/AKfycbyIA3xAKoxX5XS-I1Ts1SYkMJkKfNepGFy7Mm5psCoK_nrUKDflRiJi1P7N58N7cIYM/exec';
const CHALLENGE_START = '2026-07-20';
const CHALLENGE_END = '2026-08-16';

let rosterData = [];
let rosterSort = 'name';
let rosterGradeFilter = '';

const $ = (id) => document.getElementById(id);
const pad = (n) => String(n).padStart(2,'0');

function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

async function api(action, payload, _retried){
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, payload: payload || {} })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'API 오류');
    return data;
  }catch(e){
    if(!_retried){
      await new Promise(r => setTimeout(r, 1500));
      return api(action, payload, true);
    }
    throw e;
  }
}

loadNotice();
loadLeaderboard();
loadRoster();
loadNotes();

/* Notice */
async function loadNotice(){
  try{
    const res = await api('getNotice');
    const text = res.notice || '';
    $('noticeCurrent').textContent = text || '등록된 공지가 없습니다.';
    $('noticeInput').value = text;
  }catch(e){
    $('noticeCurrent').textContent = '공지를 불러오지 못했어요.';
  }
}
$('noticeSave').addEventListener('click', async ()=>{
  const text = $('noticeInput').value.trim();
  const btn = $('noticeSave');
  btn.disabled = true; btn.textContent = '게시 중…';
  try{
    await api('saveNotice', { text });
    $('noticeCurrent').textContent = text || '등록된 공지가 없습니다.';
    showToast('공지사항이 게시되었습니다');
  }catch(e){
    showToast('게시에 실패했어요. 다시 시도해주세요');
  }
  btn.disabled = false; btn.textContent = '공지 게시';
});

/* Leaderboard */
async function loadLeaderboard(){
  const list = $('rankList');
  list.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try{
    const res = await api('getLeaderboard');
    const results = res.leaderboard || [];
    if(results.length === 0){
      list.innerHTML = '<div class="empty-state">아직 등록된 기록이 없어요.</div>';
      return;
    }
    const fmt = (mins)=>{ const h=Math.floor((mins||0)/60), m=(mins||0)%60; return `${h}h ${m}m`; };
    list.innerHTML = '';
    results.forEach((r,i)=>{
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.innerHTML = `<div class="rank-num">${i+1}</div><div class="rank-name">${r.name}${r.grade?` (${r.grade})`:''}</div><div class="rank-time">${fmt(r.totalMinutes)}</div>`;
      list.appendChild(row);
    });
  }catch(e){
    list.innerHTML = '<div class="empty-state">순위를 불러오지 못했어요.</div>';
  }
}
$('refreshBoard').addEventListener('click', loadLeaderboard);

/* ---------- 학생 전체 보기 ---------- */
async function loadRoster(){
  const list = $('rosterList');
  list.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try{
    const res = await api('getLeaderboard');
    rosterData = res.leaderboard || [];
    renderRoster();
  }catch(e){
    list.innerHTML = '<div class="empty-state">학생 목록을 불러오지 못했어요.</div>';
  }
}
$('refreshRoster').addEventListener('click', loadRoster);

function renderRoster(){
  const list = $('rosterList');
  let rows = rosterData.slice();

  if(rosterGradeFilter){
    rows = rows.filter(r => r.grade === rosterGradeFilter);
  }

  if(rosterSort === 'name'){
    rows.sort((a,b)=> (a.name||'').localeCompare(b.name||'', 'ko'));
  } else if(rosterSort === 'grade'){
    rows.sort((a,b)=> (a.grade||'').localeCompare(b.grade||'', 'ko') || (a.name||'').localeCompare(b.name||'', 'ko'));
  } else if(rosterSort === 'time'){
    rows.sort((a,b)=> (b.totalMinutes||0) - (a.totalMinutes||0));
  }

  if(rows.length === 0){
    list.innerHTML = '<div class="empty-state">해당하는 학생이 없어요.</div>';
    return;
  }

  const fmt = (mins)=>{ const h=Math.floor((mins||0)/60), m=(mins||0)%60; return `${h}h ${m}m`; };
  list.innerHTML = '';
  rows.forEach(r=>{
    const row = document.createElement('div');
    row.className = 'roster-row';
    row.innerHTML = `<div class="r-name">${r.name}</div><div class="r-grade">${r.grade||'-'}</div><div class="r-time">${fmt(r.totalMinutes)}</div><div class="r-arrow">›</div>`;
    row.addEventListener('click', ()=> openStudentDetail(r));
    list.appendChild(row);
  });
}

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    rosterSort = btn.dataset.sort;
    renderRoster();
  });
});
document.querySelectorAll('.filter-chip').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    rosterGradeFilter = btn.dataset.grade;
    renderRoster();
  });
});

/* ---------- 학생 상세보기 ---------- */
function isInChallengeRange(dateKey){
  const dt = new Date(dateKey+'T00:00:00');
  const s = new Date(CHALLENGE_START+'T00:00:00');
  const e = new Date(CHALLENGE_END+'T00:00:00');
  return dt>=s && dt<=e;
}

async function openStudentDetail(r){
  $('detailName').textContent = r.name;
  $('detailGrade').textContent = r.grade || '';
  $('detailTotal').textContent = '0h 0m';
  $('detailDays').textContent = '0/28';
  $('detailList').innerHTML = '<div class="empty-state">불러오는 중…</div>';
  $('detailOverlay').classList.add('open');

  try{
    const res = await api('getEntries', { studentKey: r.studentKey });
    const entries = res.entries || {};
    const dateKeys = Object.keys(entries)
      .filter(k => isInChallengeRange(k) && entries[k].minutes)
      .sort();

    let totalMinutes = 0;
    dateKeys.forEach(k => totalMinutes += entries[k].minutes);
    const h = Math.floor(totalMinutes/60), m = totalMinutes%60;
    $('detailTotal').textContent = `${h}h ${m}m`;
    $('detailDays').textContent = `${dateKeys.length}/28`;

    if(dateKeys.length === 0){
      $('detailList').innerHTML = '<div class="empty-state">아직 기록한 날이 없어요.</div>';
      return;
    }

    $('detailList').innerHTML = '';
    dateKeys.forEach(key=>{
      const entry = entries[key];
      const [y,mo,d] = key.split('-').map(Number);
      const eh = Math.floor(entry.minutes/60), em = entry.minutes%60;
      const row = document.createElement('div');
      row.className = 'day-entry';
      let html = `<div class="de-head"><div class="de-date">${mo}월 ${d}일</div><div class="de-time">${eh>0?eh+'h':''}${em>0?em+'m':(eh===0?'0m':'')}</div></div>`;
      if(entry.note){
        html += `<div class="de-note">${entry.note.replace(/</g,'&lt;')}</div>`;
      }
      if(entry.photos && entry.photos.length){
        html += `<div class="day-photos">`;
        entry.photos.forEach(p=>{
          html += `<a href="${p.url}" target="_blank" rel="noopener"><img src="${p.url}"></a>`;
        });
        html += `</div>`;
      }
      row.innerHTML = html;
      $('detailList').appendChild(row);
    });
  }catch(e){
    $('detailList').innerHTML = '<div class="empty-state">기록을 불러오지 못했어요.</div>';
  }
}
$('closeDetail').addEventListener('click', ()=> $('detailOverlay').classList.remove('open'));
$('detailOverlay').addEventListener('click', (e)=>{ if(e.target.id==='detailOverlay') $('detailOverlay').classList.remove('open'); });

/* Teacher notes */
async function loadNotes(){
  const container = $('noteList');
  container.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try{
    const res = await api('getTeacherNotes');
    const notes = res.notes || [];
    if(notes.length === 0){
      container.innerHTML = '<div class="empty-state">아직 문의사항이 없어요.</div>';
      return;
    }
    container.innerHTML = '';
    notes.forEach(n=>{
      const row = document.createElement('div');
      row.className = 'note-row';
      const d = n.ts ? new Date(n.ts) : null;
      const timeStr = d ? `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}` : '';
      row.innerHTML = `<div class="note-meta">${n.grade||''} ${n.name||'익명'} · ${timeStr}</div><div class="note-msg">${(n.message||'').replace(/</g,'&lt;')}</div>`;
      container.appendChild(row);
    });
  }catch(e){
    container.innerHTML = '<div class="empty-state">문의사항을 불러오지 못했어요.</div>';
  }
}
$('refreshNotes').addEventListener('click', loadNotes);
</script>
</body>
</html>
