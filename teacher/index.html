<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순공시간 챌린지 · 교사용</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAFE; --card:#FFFFFF; --border:#ECEBF7; --ink:#241F3D; --ink-soft:#9490B0;
    --accent:#7C5CFC; --rose:#F0426C;
    --mon:#FF6B6B; --tue:#FFA94D; --wed:#F4C430; --thu:#51CF66; --fri:#4DABF7; --sat:#7C5CFC; --sun:#CC5DE8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;-webkit-font-smoothing:antialiased;padding:20px 16px 60px;}
  .wrap{max-width:560px;margin:0 auto;}
  .hidden{display:none !important;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11px;letter-spacing:.08em;font-weight:700;color:var(--accent);
    text-transform:uppercase;
    background:linear-gradient(90deg, rgba(124,92,252,.10), rgba(204,93,232,.10));
    border:1px solid rgba(124,92,252,.18);
    padding:5px 13px;border-radius:100px;margin-bottom:12px;
  }
  h1{font-weight:700;font-size:23px;margin:0 0 12px;letter-spacing:-.01em;
    background:linear-gradient(90deg,var(--accent),var(--sun));
    -webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block;}
  .rainbow-bar{height:5px;border-radius:100px;margin-bottom:20px;background:linear-gradient(90deg,var(--mon),var(--tue),var(--wed),var(--thu),var(--fri),var(--sat),var(--sun));}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 2px 16px rgba(31,42,68,.04);}

  input[type=password], input[type=text], textarea{
    width:100%;font-family:inherit;font-size:14px;padding:11px 12px;border-radius:11px;
    border:1px solid var(--border);background:var(--paper);color:var(--ink);
  }
  input:focus, textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  textarea{resize:none;min-height:90px;}
  .btn{width:100%;margin-top:10px;padding:13px;border-radius:13px;border:none;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#255bc2;}
  .btn-primary:disabled{opacity:.6;cursor:default;}

  .section-title{font-weight:700;font-size:17px;margin-bottom:12px;}
  .notice-current{font-size:13px;color:var(--ink-soft);margin-bottom:10px;padding:10px 12px;background:var(--paper);border-radius:10px;white-space:pre-wrap;}

  .rank-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border);}
  .rank-row:last-child{border-bottom:none;}
  .rank-num{width:24px;font-weight:700;font-size:14px;color:var(--ink-soft);text-align:center;}
  .rank-name{flex:1;font-size:13.5px;font-weight:600;}
  .rank-time{font-size:14px;font-weight:600;}

  .note-row{padding:12px 2px;border-bottom:1px solid var(--border);}
  .note-row:last-child{border-bottom:none;}
  .reply-row{margin-top:8px;}
  .reply-row textarea{min-height:52px;margin-bottom:6px;font-size:12.5px;}
  .reply-send-btn{width:100%;padding:9px;border-radius:10px;border:none;font-weight:700;font-size:12.5px;cursor:pointer;}
  .reply-unavailable{margin-top:6px;font-size:11px;color:var(--ink-soft);}
  .note-meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;}
  .note-msg{font-size:13.5px;line-height:1.5;}
  .empty-state{text-align:center;color:var(--ink-soft);font-size:12.5px;padding:20px 0;}
  .refresh-link{font-size:11.5px;color:var(--accent);cursor:pointer;font-weight:600;text-align:right;margin-bottom:10px;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:100px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  /* 학생 전체 보기 */
  .roster-controls{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .roster-sort, .roster-filter{display:flex;gap:6px;flex-wrap:wrap;}
  .sort-btn, .filter-chip{
    font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;
    border:1px solid var(--border);background:var(--paper);color:var(--ink-soft);cursor:pointer;
  }
  .sort-btn.active, .filter-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .roster-row{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--border);cursor:pointer;}
  .roster-row:last-child{border-bottom:none;}
  .roster-row:hover{background:var(--paper);}
  .roster-row .r-name{flex:1;font-size:13.5px;font-weight:600;}
  .roster-row .r-grade{font-size:11.5px;color:var(--ink-soft);background:var(--paper);border-radius:100px;padding:3px 9px;}
  .roster-row .r-time{font-size:13.5px;font-weight:700;color:var(--accent);}
  .roster-row .r-arrow{color:var(--ink-soft);font-size:14px;}

  /* 학생 상세보기 */
  .overlay{position:fixed;inset:0;background:rgba(31,42,68,.45);display:none;align-items:flex-end;justify-content:center;z-index:70;}
  .overlay.open{display:flex;}
  .detail-modal{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:22px;max-height:88vh;overflow-y:auto;}
  .detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .detail-head .d-name{font-weight:700;font-size:19px;}
  .detail-head .close-btn{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;line-height:1;}
  .detail-grade{font-size:12px;color:var(--ink-soft);margin-bottom:14px;}

  /* 배틀로그 축소판 - 학생이 보는 화면과 동일한 다크 톤으로 스코프 처리 */
  .battle-log-embed{
    background:#151016;border-radius:16px;padding:20px;margin-bottom:14px;
    --track:#2A1E22;--gold:#E8B44C;--b-border:#3A2126;--b-ink:#F5EDE4;--b-ink-soft:#B8A99C;
    --mon:#C81E3A;--mon-bg:rgba(200,30,58,.22);--mon-tx:#FF9DA8;
    --tue:#E63946;--tue-bg:rgba(230,57,70,.20);--tue-tx:#FFAFB6;
    --wed:#F0632E;--wed-bg:rgba(240,99,46,.20);--wed-tx:#FFB98F;
    --thu:#F2994A;--thu-bg:rgba(242,153,74,.20);--thu-tx:#FFD1A3;
    --fri:#E8B44C;--fri-bg:rgba(232,180,76,.20);--fri-tx:#FFE1A8;
    --sat:#D4A017;--sat-bg:rgba(212,160,23,.20);--sat-tx:#FFDD7A;
    --sun:#B8860B;--sun-bg:rgba(184,134,11,.22);--sun-tx:#F2CC6B;
  }
  .b-ring-row{display:flex;align-items:center;gap:16px;}
  .b-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
  .b-ring-wrap svg{transform:rotate(-90deg);display:block;}
  .b-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .b-ring-total{font-family:'Black Han Sans', sans-serif;font-size:22px;color:#fff;}
  .b-ring-total span{font-size:10px;font-weight:600;color:var(--b-ink-soft);margin-left:1px;}
  .b-ring-label{font-size:9px;color:var(--b-ink-soft);margin-top:3px;}
  .b-mini-stats{flex:1;display:flex;flex-direction:column;gap:6px;}
  .b-mini-stats .stat{display:flex;justify-content:space-between;font-size:11.5px;color:var(--b-ink-soft);}
  .b-mini-stats .stat b{font-family:'Black Han Sans', sans-serif;font-size:13px;color:var(--gold);font-weight:400;}
  .b-week-bars{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;height:70px;margin-top:16px;padding-top:14px;border-top:1px solid var(--b-border);}
  .b-week-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;}
  .b-week-value{font-size:9.5px;font-weight:700;color:var(--b-ink-soft);margin-bottom:4px;white-space:nowrap;}
  .b-week-track{flex:1;width:100%;max-width:26px;background:var(--track);border-radius:100px;display:flex;align-items:flex-end;overflow:hidden;}
  .b-week-fill{width:100%;border-radius:100px;}
  .b-week-label{font-size:9px;color:var(--b-ink-soft);margin-top:5px;}

  .battle-cal{background:#151016;border-radius:16px;padding:20px;margin-bottom:14px;
    --mon-bg:rgba(200,30,58,.22);--mon-tx:#FF9DA8;--tue-bg:rgba(230,57,70,.20);--tue-tx:#FFAFB6;
    --wed-bg:rgba(240,99,46,.20);--wed-tx:#FFB98F;--thu-bg:rgba(242,153,74,.20);--thu-tx:#FFD1A3;
    --fri-bg:rgba(232,180,76,.20);--fri-tx:#FFE1A8;--sat-bg:rgba(212,160,23,.20);--sat-tx:#FFDD7A;
    --sun-bg:rgba(184,134,11,.22);--sun-tx:#F2CC6B;--gold:#E8B44C;--b-border:#3A2126;--b-ink-soft:#B8A99C;}
  .battle-cal .cal-title{font-size:12px;font-weight:700;color:var(--b-ink-soft);margin-bottom:12px;text-align:center;}
  .b-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;}
  .b-weekdays div{text-align:center;font-size:9.5px;color:var(--b-ink-soft);font-weight:700;padding:3px 0;}
  .b-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .b-day{position:relative;aspect-ratio:1/1;border-radius:9px;border:1px solid var(--b-border);background:#1A1315;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:3px;}
  .b-day .b-num{font-weight:700;font-size:8px;color:var(--b-ink-soft);position:absolute;top:3px;left:4px;}
  .b-day .b-time{font-family:'Black Han Sans', sans-serif;font-size:11px;font-weight:700;margin-top:4px;color:#fff;}
  .b-day .b-cam{position:absolute;bottom:2px;right:3px;font-size:7px;}
  .b-day-panel{margin-top:14px;padding-top:14px;border-top:1px solid var(--b-border);}
  .b-day-panel .bd-date{font-size:12px;font-weight:700;color:#fff;margin-bottom:4px;}
  .b-day-panel .bd-note{font-size:12px;color:var(--b-ink-soft);line-height:1.5;margin-bottom:8px;}
  .b-day-panel .bd-photos{display:flex;gap:6px;flex-wrap:wrap;}
  .b-day-panel .bd-photos a{display:block;width:56px;height:56px;border-radius:8px;overflow:hidden;}
  .b-day-panel .bd-photos img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-loading-img{background:var(--track);}
</style>
</head>
<body>
<div class="wrap">

  <div id="dash">
    <div class="eyebrow">🎓 Academic Growth · 전남외고</div>
    <h1>교사용 대시보드</h1>
    <div class="rainbow-bar"></div>

    <div class="card">
      <div class="section-title">📌 공지사항 관리</div>
      <div class="notice-current" id="noticeCurrent">등록된 공지가 없습니다.</div>
      <textarea id="noticeInput" placeholder="학생들에게 전할 공지사항을 입력하세요"></textarea>
      <button class="btn btn-primary" id="noticeSave">공지 게시</button>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshBoard">↻ 새로고침</div>
      <div class="section-title">🏆 전체 순위</div>
      <div id="rankList"><div class="empty-state">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshRoster">↻ 새로고침</div>
      <div class="section-title">👥 학생 전체 보기</div>
      <div class="roster-controls">
        <div class="roster-sort">
          <button class="sort-btn active" data-sort="name">이름순</button>
          <button class="sort-btn" data-sort="grade">학년순</button>
          <button class="sort-btn" data-sort="time">시간순</button>
        </div>
        <div class="roster-filter" id="gradeFilter">
          <button class="filter-chip active" data-grade="">전체</button>
          <button class="filter-chip" data-grade="1학년">1학년</button>
          <button class="filter-chip" data-grade="2학년">2학년</button>
          <button class="filter-chip" data-grade="3학년">3학년</button>
        </div>
      </div>
      <div id="rosterList"><div class="empty-state">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshCheer">↻ 새로고침</div>
      <div class="section-title">📣 응원 게시판</div>
      <div id="cheerList"><div class="empty-state">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="refresh-link" id="refreshNotes">↻ 새로고침</div>
      <div class="section-title">✉️ 학생 문의사항</div>
      <div id="noteList"><div class="empty-state">불러오는 중…</div></div>
    </div>
  </div>

</div>

<div class="overlay" id="detailOverlay">
  <div class="detail-modal">
    <div class="detail-head">
      <div class="d-name" id="detailName">-</div>
      <button class="close-btn" id="closeDetail">✕</button>
    </div>
    <div class="detail-grade" id="detailGrade"></div>

    <div class="card" style="padding:16px;margin-bottom:14px;background:var(--paper);">
      <div class="section-title" style="font-size:13px;margin-bottom:8px;">💬 이 학생에게 메시지 보내기</div>
      <textarea id="directMsgInput" placeholder="이 학생에게만 보이는 메시지를 입력하세요" style="min-height:56px;margin-bottom:8px;font-size:12.5px;"></textarea>
      <button class="btn btn-primary" id="directMsgSend" style="width:100%;padding:10px;font-size:12.5px;">보내기</button>
    </div>

    <div class="battle-log-embed">
      <div class="b-ring-row">
        <div class="b-ring-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" fill="none" stroke="var(--track)" stroke-width="11"/>
            <g id="detailRingSegments"></g>
          </svg>
          <div class="b-ring-center">
            <div class="b-ring-total" id="detailRingTotal">0<span>h 0m</span></div>
            <div class="b-ring-label" id="detailRingPercent">목표의 0%</div>
          </div>
        </div>
        <div class="b-mini-stats">
          <div class="stat"><span>목표</span><b>100h</b></div>
          <div class="stat"><span>남은 시간</span><b id="detailRemain">100h</b></div>
          <div class="stat"><span>기록한 날</span><b id="detailDays">0/28</b></div>
        </div>
      </div>
      <div class="b-week-bars" id="detailWeekBars"></div>
    </div>

    <div class="battle-cal">
      <div class="cal-title" id="detailCalRange">챌린지 캘린더 · 7/20 – 8/16</div>
      <div class="b-weekdays"><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div><div>일</div></div>
      <div class="b-grid" id="detailCalGrid"></div>
      <div class="b-day-panel" id="detailDayPanel"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">저장되었습니다</div>

<script>
/* Apps Script 배포 URL을 붙여넣으세요 (학생용 파일과 동일한 URL) */
const API_URL = 'https://script.google.com/macros/s/AKfycbyIA3xAKoxX5XS-I1Ts1SYkMJkKfNepGFy7Mm5psCoK_nrUKDflRiJi1P7N58N7cIYM/exec';
const CHALLENGE_START = '2026-07-20';
const CHALLENGE_END = '2026-08-16';
const GOAL_HOURS = 100;
const RING_CIRC = 2 * Math.PI * 50;

const WEEK_RANGES = [
  {label:'1주', start:'2026-07-20', end:'2026-07-26', color:'#7C5CFC'},
  {label:'2주', start:'2026-07-27', end:'2026-08-02', color:'#FF6B9D'},
  {label:'3주', start:'2026-08-03', end:'2026-08-09', color:'#4DABF7'},
  {label:'4주', start:'2026-08-10', end:'2026-08-16', color:'#51CF66'},
];
const WEEKDAY = [
  {label:'월', var:'--mon', bg:'--mon-bg', tx:'--mon-tx'},
  {label:'화', var:'--tue', bg:'--tue-bg', tx:'--tue-tx'},
  {label:'수', var:'--wed', bg:'--wed-bg', tx:'--wed-tx'},
  {label:'목', var:'--thu', bg:'--thu-bg', tx:'--thu-tx'},
  {label:'금', var:'--fri', bg:'--fri-bg', tx:'--fri-tx'},
  {label:'토', var:'--sat', bg:'--sat-bg', tx:'--sat-tx'},
  {label:'일', var:'--sun', bg:'--sun-bg', tx:'--sun-tx'},
];

let rosterData = [];
let rosterSort = 'name';
let rosterGradeFilter = '';

const $ = (id) => document.getElementById(id);

function attachImageRetry(img, maxRetries){
  maxRetries = maxRetries || 3;
  let attempts = 0;
  let usedFallback = false;
  const baseSrc = img.getAttribute('src');
  img.addEventListener('error', function onErr(){
    if(attempts < maxRetries){
      attempts++;
      setTimeout(()=>{
        img.src = baseSrc + (baseSrc.indexOf('?') > -1 ? '&' : '?') + '_retry=' + Date.now();
      }, 900 * attempts);
    } else if(!usedFallback && img.dataset.fileid){
      usedFallback = true; attempts = 0;
      img.src = 'https://drive.google.com/uc?export=view&id=' + img.dataset.fileid;
    }
  });
}

const pad = (n) => String(n).padStart(2,'0');

function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

async function api(action, payload, _retried){
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, payload: payload || {} })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'API 오류');
    return data;
  }catch(e){
    if(!_retried){
      await new Promise(r => setTimeout(r, 1500));
      return api(action, payload, true);
    }
    throw e;
  }
}

loadNotice();
loadLeaderboard();
loadRoster();
loadCheerBoard();
loadNotes();

/* Notice */
async function loadNotice(){
  try{
    const res = await api('getNotice');
    const text = res.notice || '';
    $('noticeCurrent').textContent = text || '등록된 공지가 없습니다.';
    $('noticeInput').value = text;
  }catch(e){
    $('noticeCurrent').textContent = '공지를 불러오지 못했어요.';
  }
}
$('noticeSave').addEventListener('click', async ()=>{
  const text = $('noticeInput').value.trim();
  const btn = $('noticeSave');
  btn.disabled = true; btn.textContent = '게시 중…';
  try{
    await api('saveNotice', { text });
    $('noticeCurrent').textContent = text || '등록된 공지가 없습니다.';
    showToast('공지사항이 게시되었습니다');
  }catch(e){
    showToast('게시에 실패했어요. 다시 시도해주세요');
  }
  btn.disabled = false; btn.textContent = '공지 게시';
});

/* Leaderboard */
async function loadLeaderboard(){
  const list = $('rankList');
  list.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try{
    const res = await api('getLeaderboard');
    const results = res.leaderboard || [];
    if(results.length === 0){
      list.innerHTML = '<div class="empty-state">아직 등록된 기록이 없어요.</div>';
      return;
    }
    const fmt = (mins)=>{ const h=Math.floor((mins||0)/60), m=(mins||0)%60; return `${h}h ${m}m`; };
    list.innerHTML = '';
    results.forEach((r,i)=>{
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.innerHTML = `<div class="rank-num">${i+1}</div><div class="rank-name">${r.name}${r.grade?` (${r.grade})`:''}</div><div class="rank-time">${fmt(r.totalMinutes)}</div>`;
      list.appendChild(row);
    });
  }catch(e){
    list.innerHTML = '<div class="empty-state">순위를 불러오지 못했어요.</div>';
  }
}
$('refreshBoard').addEventListener('click', loadLeaderboard);

/* ---------- 학생 전체 보기 ---------- */
async function loadRoster(){
  const list = $('rosterList');
  list.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try{
    const res = await api('getLeaderboard');
    rosterData = res.leaderboard || [];
    renderRoster();
  }catch(e){
    list.innerHTML = '<div class="empty-state">학생 목록을 불러오지 못했어요.</div>';
  }
}
$('refreshRoster').addEventListener('click', loadRoster);

function renderRoster(){
  const list = $('rosterList');
  let rows = rosterData.slice();

  if(rosterGradeFilter){
    rows = rows.filter(r => r.grade === rosterGradeFilter);
  }

  if(rosterSort === 'name'){
    rows.sort((a,b)=> (a.name||'').localeCompare(b.name||'', 'ko'));
  } else if(rosterSort === 'grade'){
    rows.sort((a,b)=> (a.grade||'').localeCompare(b.grade||'', 'ko') || (a.name||'').localeCompare(b.name||'', 'ko'));
  } else if(rosterSort === 'time'){
    rows.sort((a,b)=> (b.totalMinutes||0) - (a.totalMinutes||0));
  }

  if(rows.length === 0){
    list.innerHTML = '<div class="empty-state">해당하는 학생이 없어요.</div>';
    return;
  }

  const fmt = (mins)=>{ const h=Math.floor((mins||0)/60), m=(mins||0)%60; return `${h}h ${m}m`; };
  list.innerHTML = '';
  rows.forEach(r=>{
    const row = document.createElement('div');
    row.className = 'roster-row';
    row.innerHTML = `<div class="r-name">${r.name}</div><div class="r-grade">${r.grade||'-'}</div><div class="r-time">${fmt(r.totalMinutes)}</div><div class="r-arrow">›</div>`;
    row.addEventListener('click', ()=> openStudentDetail(r));
    list.appendChild(row);
  });
}

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    rosterSort = btn.dataset.sort;
    renderRoster();
  });
});
document.querySelectorAll('.filter-chip').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    rosterGradeFilter = btn.dataset.grade;
    renderRoster();
  });
});

/* ---------- 학생 상세보기 (배틀로그 축소판) ---------- */
function isInChallengeRange(dateKey){
  const dt = new Date(dateKey+'T00:00:00');
  const s = new Date(CHALLENGE_START+'T00:00:00');
  const e = new Date(CHALLENGE_END+'T00:00:00');
  return dt>=s && dt<=e;
}
const weekdayIndex = (y,m,d) => { const wd = new Date(y,m,d).getDay(); return (wd+6)%7; };
const pad2 = (n) => String(n).padStart(2,'0');
const toDateKey = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;

function challengeDates(){
  const dates = [];
  const cur = new Date(CHALLENGE_START+'T00:00:00');
  const end = new Date(CHALLENGE_END+'T00:00:00');
  while(cur <= end){ dates.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
}

let detailEntries = {};

let currentDetailStudentKey = null;

async function openStudentDetail(r){
  currentDetailStudentKey = r.studentKey;
  $('detailName').textContent = r.name;
  $('detailGrade').textContent = r.grade || '';
  $('directMsgInput').value = '';
  $('detailRingTotal').innerHTML = '0<span>h 0m</span>';
  $('detailRingPercent').textContent = '목표의 0%';
  $('detailRemain').textContent = '100h';
  $('detailDays').textContent = '0/28';
  $('detailWeekBars').innerHTML = '';
  $('detailCalGrid').innerHTML = '';
  $('detailDayPanel').innerHTML = '';
  $('detailOverlay').classList.add('open');

  try{
    const res = await api('getEntries', { studentKey: r.studentKey });
    detailEntries = res.entries || {};
    renderDetailRing();
    renderDetailWeekBars();
    renderDetailCalendar();
  }catch(e){
    $('detailWeekBars').innerHTML = '<div class="empty-state">기록을 불러오지 못했어요.</div>';
  }
}

function computeDetailTotals(){
  let totalMinutes = 0, daysLogged = 0;
  const byWeekday = [0,0,0,0,0,0,0];
  Object.keys(detailEntries).forEach(key=>{
    const [y,m,d] = key.split('-').map(Number);
    if(isInChallengeRange(key)){
      const e = detailEntries[key];
      if(e && e.minutes){
        totalMinutes += e.minutes; daysLogged += 1;
        byWeekday[weekdayIndex(y,m-1,d)] += e.minutes;
      }
    }
  });
  return {totalMinutes, daysLogged, byWeekday};
}

function renderDetailRing(){
  const embed = document.querySelector('.battle-log-embed');
  const cssVar = (name) => getComputedStyle(embed).getPropertyValue(name).trim();
  const {totalMinutes, daysLogged, byWeekday} = computeDetailTotals();
  const goalMinutes = GOAL_HOURS * 60;

  const seg = $('detailRingSegments');
  seg.innerHTML = '';
  let cumulative = 0;
  WEEKDAY.forEach((wd, i)=>{
    let len = (byWeekday[i]/goalMinutes) * RING_CIRC;
    if(cumulative + len > RING_CIRC) len = Math.max(0, RING_CIRC - cumulative);
    if(len > 0.5){
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx','60'); c.setAttribute('cy','60'); c.setAttribute('r','50');
      c.setAttribute('fill','none');
      c.setAttribute('stroke', cssVar(wd.var) || '#ccc');
      c.setAttribute('stroke-width','11');
      c.setAttribute('stroke-dasharray', `${len.toFixed(2)} ${(RING_CIRC-len).toFixed(2)}`);
      c.setAttribute('stroke-dashoffset', `${(-cumulative).toFixed(2)}`);
      seg.appendChild(c);
    }
    cumulative += len;
  });

  const h = Math.floor(totalMinutes/60), m = totalMinutes % 60;
  $('detailRingTotal').innerHTML = `${h}<span>h ${m}m</span>`;
  const pct = Math.round((totalMinutes/goalMinutes)*100);
  $('detailRingPercent').textContent = `목표의 ${pct}%`;
  const remain = Math.max(0, goalMinutes - totalMinutes);
  $('detailRemain').textContent = `${Math.floor(remain/60)}h ${remain%60}m`;
  $('detailDays').textContent = `${daysLogged}/28`;
}

function computeDetailWeeklyTotals(){
  return WEEK_RANGES.map(wr=>{
    const start = new Date(wr.start+'T00:00:00');
    const end = new Date(wr.end+'T00:00:00');
    let mins = 0;
    Object.keys(detailEntries).forEach(key=>{
      const [y,m,d] = key.split('-').map(Number);
      const dt = new Date(y,m-1,d);
      if(dt>=start && dt<=end){
        const e = detailEntries[key];
        if(e && e.minutes) mins += e.minutes;
      }
    });
    return mins;
  });
}

function renderDetailWeekBars(){
  const weekly = computeDetailWeeklyTotals();
  const maxRef = Math.max(30*60, ...weekly);
  const container = $('detailWeekBars');
  container.innerHTML = '';
  WEEK_RANGES.forEach((wr, i)=>{
    const mins = weekly[i];
    const h = Math.floor(mins/60), m = mins%60;
    const pct = Math.min(100, Math.round((mins/maxRef)*100));
    const col = document.createElement('div');
    col.className = 'b-week-col';
    col.innerHTML = `
      <div class="b-week-value">${h>0?h+'h':''}${m>0?m+'m':(h===0?'0m':'')}</div>
      <div class="b-week-track"><div class="b-week-fill" style="height:${pct}%;background:${wr.color};"></div></div>
      <div class="b-week-label">${wr.label}</div>
    `;
    container.appendChild(col);
  });
}

function renderDetailCalendar(){
  const cal = document.querySelector('.battle-cal');
  const cssVar = (name) => getComputedStyle(cal).getPropertyValue(name).trim();
  const grid = $('detailCalGrid'); grid.innerHTML = '';
  $('detailDayPanel').innerHTML = '';
  const dates = challengeDates();
  const first = dates[0];
  let startOffset = first.getDay() - 1; if(startOffset < 0) startOffset = 6;
  for(let i=0;i<startOffset;i++){
    const f = document.createElement('div'); f.style.visibility='hidden'; f.className='b-day'; grid.appendChild(f);
  }
  dates.forEach(dt=>{
    const y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
    const key = toDateKey(y,m,d);
    const entry = detailEntries[key];
    const wIdx = weekdayIndex(y,m,d);
    const wd = WEEKDAY[wIdx];
    const cell = document.createElement('div');
    cell.className = 'b-day';
    if(entry && entry.minutes){
      cell.style.background = cssVar(wd.bg);
      cell.style.borderColor = 'transparent';
    }
    const num = document.createElement('div'); num.className='b-num'; num.textContent = `${m+1}/${d}`;
    cell.appendChild(num);
    if(entry && entry.minutes){
      const t = document.createElement('div');
      t.className = 'b-time';
      t.style.color = cssVar(wd.tx);
      const h = Math.floor(entry.minutes/60), mm = entry.minutes%60;
      t.textContent = h>0 ? `${h}h${mm>0?mm:''}` : `${mm}m`;
      cell.appendChild(t);
    }
    if(entry && entry.photos && entry.photos.length){
      const cam = document.createElement('div'); cam.className='b-cam'; cam.textContent='📷';
      cell.appendChild(cam);
    }
    cell.addEventListener('click', ()=>{
      const panel = $('detailDayPanel');
      if(!entry || (!entry.note && (!entry.photos || !entry.photos.length))){
        panel.innerHTML = `<div class="bd-date">${m+1}월 ${d}일</div><div class="bd-note">기록된 메모나 사진이 없어요.</div>`;
        return;
      }
      let html = `<div class="bd-date">${m+1}월 ${d}일</div>`;
      if(entry.note) html += `<div class="bd-note">${entry.note.replace(/</g,'&lt;')}</div>`;
      if(entry.photos && entry.photos.length){
        html += `<div class="bd-photos">`;
        entry.photos.forEach(p=>{ html += `<a href="${p.url}" target="_blank" rel="noopener"><img src="${p.url}" data-fileid="${p.fileId||''}"></a>`; });
        html += `</div>`;
      }
      panel.innerHTML = html;
      panel.querySelectorAll('.bd-photos img').forEach(img => attachImageRetry(img));
    });
    grid.appendChild(cell);
  });
}
$('directMsgSend').addEventListener('click', async ()=>{
  const msg = $('directMsgInput').value.trim();
  if(!msg){ showToast('메시지를 입력해주세요'); return; }
  if(!currentDetailStudentKey){ showToast('학생 정보를 찾을 수 없어요'); return; }
  const btn = $('directMsgSend');
  btn.disabled = true; btn.textContent = '전송 중…';
  try{
    await api('saveTeacherReply', { studentKey: currentDetailStudentKey, message: msg });
    $('directMsgInput').value = '';
    showToast('메시지를 보냈어요');
  }catch(e){
    showToast('전송에 실패했어요. 다시 시도해주세요.');
  }
  btn.disabled = false; btn.textContent = '보내기';
});

$('closeDetail').addEventListener('click', ()=> $('detailOverlay').classList.remove('open'));
$('detailOverlay').addEventListener('click', (e)=>{ if(e.target.id==='detailOverlay') $('detailOverlay').classList.remove('open'); });

/* Teacher notes */
/* Cheer board (교사용은 이름/학년 공개) */
async function loadCheerBoard(){
  const container = $('cheerList');
  container.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  let posts = [];
  try{
    const res = await api('getBoardPosts');
    posts = res.posts || [];
  }catch(e){
    container.innerHTML = '<div class="empty-state">응원 글을 불러오지 못했어요.</div>';
    return;
  }
  if(posts.length === 0){
    container.innerHTML = '<div class="empty-state">아직 응원 글이 없어요.</div>';
    return;
  }
  container.innerHTML = '';
  posts.forEach(p=>{
    const row = document.createElement('div');
    row.className = 'note-row';
    const d = p.ts ? new Date(p.ts) : null;
    const timeStr = d ? `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}` : '';
    row.innerHTML = `<div class="note-meta">${p.grade||''} ${p.name||'익명'} · ${timeStr}</div><div class="note-msg">${(p.message||'').replace(/</g,'&lt;')}</div>`;
    container.appendChild(row);
  });
}
$('refreshCheer').addEventListener('click', loadCheerBoard);

async function loadNotes(){
  const container = $('noteList');
  container.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try{
    const res = await api('getTeacherNotes');
    const notes = res.notes || [];
    if(notes.length === 0){
      container.innerHTML = '<div class="empty-state">아직 문의사항이 없어요.</div>';
      return;
    }
    container.innerHTML = '';
    notes.forEach((n, idx)=>{
      const row = document.createElement('div');
      row.className = 'note-row';
      const d = n.ts ? new Date(n.ts) : null;
      const timeStr = d ? `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}` : '';
      const hasKey = !!n.studentKey;
      row.innerHTML = `
        <div class="note-meta">${n.grade||''} ${n.name||'익명'} · ${timeStr}</div>
        <div class="note-msg">${(n.message||'').replace(/</g,'&lt;')}</div>
        ${hasKey ? `
          <div class="reply-row" id="replyRow${idx}">
            <textarea class="reply-input" id="replyInput${idx}" placeholder="이 학생에게만 보이는 답장을 입력하세요"></textarea>
            <button class="btn btn-primary reply-send-btn" data-idx="${idx}" data-key="${n.studentKey}">답장 보내기</button>
          </div>
        ` : `<div class="reply-unavailable">⚠️ 이 문의는 이전 버전에서 저장되어 답장을 보낼 수 없어요</div>`}
      `;
      container.appendChild(row);
    });
    container.querySelectorAll('.reply-send-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const idx = btn.dataset.idx;
        const key = btn.dataset.key;
        const input = $('replyInput'+idx);
        const msg = input.value.trim();
        if(!msg){ showToast('답장 내용을 입력해주세요'); return; }
        btn.disabled = true; btn.textContent = '전송 중…';
        try{
          await api('saveTeacherReply', { studentKey: key, message: msg });
          input.value = '';
          showToast('답장을 보냈어요');
        }catch(e){
          showToast('전송에 실패했어요. 다시 시도해주세요.');
        }
        btn.disabled = false; btn.textContent = '답장 보내기';
      });
    });
  }catch(e){
    container.innerHTML = '<div class="empty-state">문의사항을 불러오지 못했어요.</div>';
  }
}
$('refreshNotes').addEventListener('click', loadNotes);
